---
- name: Install Packages
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/packages.yaml
  vars:
    install_target: "{{ (target_os | default('linux')) | lower }}"
  tasks:
    - name: Validate target_os value
      ansible.builtin.assert:
        that:
          - install_target in ['linux', 'windows']
        fail_msg: "target_os must be 'linux' or 'windows'"

    - name: Include Linux tasks
      ansible.builtin.include_tasks: tasks/install_linux.yaml
      when: install_target == 'linux'

    - name: Include Windows tasks
      ansible.builtin.include_tasks: tasks/install_windows.yaml
      when: install_target == 'windows'
