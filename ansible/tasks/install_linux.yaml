---
- name: Validate become password
  ansible.builtin.command: "true"
  become: true
  changed_when: false

- name: Get installed packages
  ansible.builtin.package_facts:
    manager: apt

- name: Install Linux Packages
  ansible.builtin.package:
    name: "{{ missing_pkgs }}"
    state: present
  vars:
    all_pkgs: "{{ packages + packages_linux }}"
    pkg_names: >-
      {{ all_pkgs | selectattr('linux_name', 'defined') | map(attribute='linux_name') | list
       + all_pkgs | rejectattr('linux_name', 'defined') | map(attribute='name') | list }}
    missing_pkgs: "{{ pkg_names | difference(ansible_facts.packages.keys() | list) }}"
  when: missing_pkgs | length > 0
  become: true

- name: Set zsh as default shell
  ansible.builtin.user:
    name: "{{ ansible_facts['env']['USER'] }}"
    shell: /bin/zsh
  become: true

- name: symlink scripts from ./bin to $HOME/bin
  ansible.builtin.file:
    src: "{{ item }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/bin/{{ item | basename }}"
    state: link
  loop: "{{ lookup('fileglob', playbook_dir + '/../bin/*', wantlist=True) }}"

- name: Install Linux Packages (script-managed)
  ansible.builtin.shell:
    cmd: "{{ item.cmd }}"
    creates: "{{ item.creates }}"
  loop: "{{ packages_linux_scripts }}"
  loop_control:
    label: "{{ item.name }}"

- name: Install Chezmoi
  ansible.builtin.shell:
    cmd: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "{{ ansible_facts['env']['HOME'] }}/bin"
    creates: "{{ ansible_facts['env']['HOME'] }}/bin/chezmoi"

- name: Init Chezmoi
  ansible.builtin.shell:
    cmd: "{{ ansible_facts['env']['HOME'] }}/bin/chezmoi init https://github.com/nonamethanks/dotfiles.git"
    creates: "{{ ansible_facts['env']['HOME'] }}/.local/share/chezmoi/dot_zshrc"

- name: Chezmoi ready
  ansible.builtin.debug:
    msg:
      - "Dotfiles ready. Next steps:"
      - "  {{ ansible_facts['env']['HOME'] }}/bin/chezmoi diff   # preview changes"
      - "  {{ ansible_facts['env']['HOME'] }}/bin/chezmoi apply  # apply changes"
      - "After applying, chezmoi will be available in your PATH."
