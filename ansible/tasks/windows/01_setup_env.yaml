- name: Check if Chezmoi is available
  ansible.windows.win_shell: chezmoi --version
  register: chezmoi_check
  failed_when: false
  changed_when: false

- name: Install Chezmoi with Scoop when missing
  ansible.windows.win_shell: scoop install chezmoi
  when: chezmoi_check.rc != 0

- name: Init Chezmoi
  ansible.windows.win_shell: |
    chezmoi init nonamethanks --ssh


    chezmoi apply ~/.zshrc
    chezmoi apply ~/.config/mise
  args:
    creates: "{{ ansible_env.USERPROFILE }}\\.local\\share\\chezmoi\\chezmoi.toml"

- name: Install mise tools
  ansible.windows.win_shell: |
    mise install

- name: Chezmoi ready
  ansible.builtin.debug:
    msg:
      - "Dotfiles ready. Next steps (on Powershell):"
      - "  gpg_sync.sh from           # import windows keys from windows to wsl"
      - "  gpg_backup.sh export       # export existing GPG keys to bitwarden"
      - "  gpg_backup.sh import       # import new GPG keys from bitwarden"
      - "  gpg_sync.sh to             # export the new keys back to windows"
      - ""
      - "  chezmoi init --data=false   # pass user variables to chezmoi"
      - "  chezmoi diff                # preview changes"
      - "  chezmoi apply               # apply changes"
